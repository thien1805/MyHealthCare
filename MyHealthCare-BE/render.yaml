services:
  - type: web
    name: myhealthcare-be
    env: python
    buildCommand: bash build.sh
    startCommand: bash startup.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: myhealthcare-db
          property: connectionString

databases:
  - name: myhealthcare-db
